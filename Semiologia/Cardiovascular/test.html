<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Test | Cardiovascular | Pino Watson MD</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .test-card {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .test-section + .test-section {
      margin-top: 28px;
    }

    .test-section h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      color: var(--text);
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .option-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .option-card input {
      margin: 0;
    }

    .inline-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }

    .custom-input {
      width: 120px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .primary-action {
      margin-top: 30px;
      text-align: center;
    }

    .start-btn {
      display: inline-block;
      padding: 14px 20px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 650;
      font: inherit;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .muted-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">Test</p>
      <h1>Configurar test</h1>
      <p class="subtitle">Personalice el tipo de preguntas, la cantidad y el tiempo.</p>
    </header>

    <section class="test-card">
      <div class="test-section">
        <h2>Modo</h2>
        <div class="option-grid">
          <label class="option-card"><input type="radio" name="modo" value="todas" checked> Todas</label>
          <label class="option-card"><input type="radio" name="modo" value="casos"> Solo casos clínicos</label>
          <label class="option-card"><input type="radio" name="modo" value="normales"> Solo preguntas normales</label>
        </div>
      </div>

      <div class="test-section">
        <h2>Unidades incluidas</h2>
        <div class="option-grid">
            <label class="option-card">
                <input type="checkbox" name="unidad" value="parenquimatosos" checked>
                  Síndromes parenquimatosos pulmonares
            </label>
        </div>
<p class="muted-note">Por ahora este es el único tema disponible para el test. Luego agregaremos los demás.</p>
      </div>

      <div class="test-section">
        <h2>Número de preguntas</h2>
        <div class="option-grid">
          <label class="option-card"><input type="radio" name="cantidad" value="10" checked> 10</label>
          <label class="option-card"><input type="radio" name="cantidad" value="25"> 25</label>
          <label class="option-card"><input type="radio" name="cantidad" value="50"> 50</label>
          <label class="option-card"><input type="radio" name="cantidad" value="all"> Todas</label>
          <label class="option-card"><input type="radio" name="cantidad" value="custom"> Personalizado</label>
        </div>

        <div class="inline-row">
          <label for="customAmount">Cantidad personalizada:</label>
          <input id="customAmount" class="custom-input" type="number" min="1" placeholder="Ej. 18">
        </div>
      </div>

      <div class="test-section">
        <h2>Tiempo</h2>
        <div class="option-grid">
          <label class="option-card"><input type="radio" name="tiempo" value="off"> Sin temporizador</label>
          <label class="option-card"><input type="radio" name="tiempo" value="60" checked> 1 minuto por pregunta</label>
        </div>
      </div>

      <div class="primary-action">
        <button class="start-btn" id="startTestBtn" type="button">Comenzar test</button>
      </div>
    </section>

    <p class="center">
      <a class="back-link" href="index.html">← Volver a Cardiovascular</a>
    </p>
  </main>
  <script>
  const startTestBtn = document.getElementById("startTestBtn");
  const customAmountInput = document.getElementById("customAmount");
  const cantidadRadios = document.querySelectorAll('input[name="cantidad"]');

  function updateCustomInputState() {
    const selected = document.querySelector('input[name="cantidad"]:checked')?.value;
    const isCustom = selected === "custom";
    customAmountInput.disabled = !isCustom;

    if (!isCustom) {
      customAmountInput.value = "";
    }
  }

  cantidadRadios.forEach(radio => {
    radio.addEventListener("change", updateCustomInputState);
  });

  updateCustomInputState();

  startTestBtn.addEventListener("click", () => {
    const modo = document.querySelector('input[name="modo"]:checked')?.value || "todas";
    const cantidad = document.querySelector('input[name="cantidad"]:checked')?.value || "10";
    const tiempoSeleccionado = document.querySelector('input[name="tiempo"]:checked')?.value || "60";
    const timed = tiempoSeleccionado !== "off";
    const tiempo = timed ? Number(tiempoSeleccionado) : 0;
    const unidades = Array.from(document.querySelectorAll('input[name="unidad"]:checked')).map(input => input.value);

    if (unidades.length === 0) {
      alert("Seleccione al menos una unidad.");
      return;
    }

    let cantidadFinal;

    if (cantidad === "all") {
      cantidadFinal = "all";
    } else if (cantidad === "custom") {
      const customValue = Number(customAmountInput.value);

      if (!Number.isInteger(customValue) || customValue < 1) {
        alert("Ingrese una cantidad personalizada válida.");
        customAmountInput.focus();
        return;
      }

      cantidadFinal = customValue;
    } else {
      cantidadFinal = Number(cantidad);
    }

    const testConfig = {
      source: "cardiovascular-test",
      mode: modo,
      units: unidades,
      questionCount: cantidadFinal,
      secondsPerQuestion: tiempo,
      timed: timed
    };

    sessionStorage.setItem("cardiovascularTestConfig", JSON.stringify(testConfig));
    window.location.href = "quiz.html?mode=test";
  });
</script>
</body>
</html>
